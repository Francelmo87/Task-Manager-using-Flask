name: Pipeline DevSecOps - Task Manager

# O pipeline será disparado automaticamente a cada push ou merge request na branch master/main
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==========================================
  # ESTÁGIO 1: BUILD & TEST (Integração Contínua)
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Dependencias e Validar Ambiente
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest  # Garante ferramenta de teste

    - name: Validar Build da Imagem Docker
      run: |
        docker build -t taskmanager-app:latest .

  # ==========================================
  # ESTÁGIO 2: SAST (Segurança Estática - Etapa 4)
  # ==========================================
  security-sast:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Baixar o codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Executar Bandit (Varredura de Codigo)
      run: |
        pip install bandit
        bandit -r todo_project/ -f txt -o bandit-report.txt
      continue-on-error: true # Permite gerar o relatorio mesmo se achar falhas

    - name: Executar Pip-Audit (Varredura de Dependencias)
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt

    - name: Upload dos Artefatos de Seguranca
      uses: actions/upload-artifact@v4
      with:
        name: relatorio-sast-bandit
        path: bandit-report.txt
